kind = "web"
previewPath = "/"
title = "Project Hub"
version = "1.0.0"
id = "artifacts/project-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18869

[services.development]
run = "pnpm --filter @workspace/project-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-hub", "run", "build" ]
publicDir = "artifacts/project-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18869"
BASE_PATH = "/"
